name: kids_quiz_game
description: A fun e-learning quiz game for children aged 3-5

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  audioplayers: ^5.2.1
  shared_preferences: ^2.2.2
  flutter_animate: ^4.3.0
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/animals/
    - assets/images/fruits/
    - assets/images/vegetables/
    - assets/images/vehicles/
    - assets/images/colors/
    - assets/images/shapes/
    - assets/audio/

